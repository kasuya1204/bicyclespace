<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自転車駐車管理システム</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col bg-gray-50 text-gray-900 font-sans">

    <!-- Header -->
    <header class="bg-white p-4 flex justify-between items-center shadow-sm z-10">
        <h1 class="text-xl font-black text-gray-800 flex items-center">
            <i data-lucide="bike" class="w-6 h-6 mr-2 text-blue-600"></i>駐輪マネージャー
        </h1>
        <div class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
            <button onclick="changeView('month')" id="btn-month" class="view-btn px-4 py-1.5 rounded-md text-sm font-bold transition-colors">月</button>
            <button onclick="changeView('week')" id="btn-week" class="view-btn px-4 py-1.5 rounded-md text-sm font-bold transition-colors">週</button>
            <button onclick="changeView('day')" id="btn-day" class="view-btn px-4 py-1.5 rounded-md text-sm font-bold transition-colors">日</button>
        </div>
    </header>

    <!-- Main Area -->
    <main class="flex-1 overflow-hidden flex flex-col max-w-7xl mx-auto w-full">
        <!-- Controls -->
        <div class="p-4 flex justify-between items-center">
            <div class="flex space-x-2">
                <button onclick="prevPeriod()" class="p-2 rounded-full hover:bg-gray-200"><i data-lucide="chevron-left" class="w-5 h-5 text-gray-600"></i></button>
                <button onclick="nextPeriod()" class="p-2 rounded-full hover:bg-gray-200"><i data-lucide="chevron-right" class="w-5 h-5 text-gray-600"></i></button>
                <button onclick="goToday()" class="ml-2 px-3 py-1 text-sm font-bold border border-gray-300 rounded text-gray-600 hover:bg-gray-100">今日</button>
            </div>
            <h2 id="header-date" class="text-xl font-black text-gray-800"></h2>
            <div class="w-[100px] flex justify-end items-center text-xs text-gray-400" id="sync-status"></div>
        </div>
        
        <!-- Calendar Container -->
        <div id="calendar-container" class="flex-1 overflow-hidden p-2 md:p-4 pt-0"></div>
    </main>

    <!-- FAB -->
    <button onclick="openModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-xl hover:bg-blue-700 hover:scale-105 transition-all z-40">
        <i data-lucide="plus" class="w-6 h-6"></i>
    </button>

    <!-- Modal Overlay -->
    <div id="modal" class="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4 z-50 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-gray-800 flex items-center">新規記録</h3>
            
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">利用区分</label>
                <div class="flex space-x-3">
                    <label id="lbl-type-in" class="type-lbl flex-1 flex flex-col items-center justify-center p-3 rounded-xl border-2 cursor-pointer transition-all border-gray-200" onclick="selectType('入庫')">
                        <i data-lucide="bike" class="w-6 h-6 mb-1 text-green-600"></i>
                        <span class="font-bold text-green-800">入庫</span>
                    </label>
                    <label id="lbl-type-out" class="type-lbl flex-1 flex flex-col items-center justify-center p-3 rounded-xl border-2 cursor-pointer transition-all border-gray-200" onclick="selectType('出庫')">
                        <i data-lucide="bike" class="w-6 h-6 mb-1 text-orange-600"></i>
                        <span class="font-bold text-orange-800">出庫</span>
                    </label>
                    <label id="lbl-type-walk" class="type-lbl flex-1 flex flex-col items-center justify-center p-3 rounded-xl border-2 cursor-pointer transition-all border-gray-200" onclick="selectType('徒歩')">
                        <i data-lucide="user" class="w-6 h-6 mb-1 text-gray-600"></i>
                        <span class="font-bold text-gray-800">徒歩</span>
                    </label>
                </div>
            </div>

            <div id="park-no-container" class="mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
                <label class="block text-sm font-semibold text-blue-900 mb-2">駐車番号 (1〜20)</label>
                <div class="flex items-center space-x-3">
                    <select id="parkNo" class="border-gray-300 rounded-lg p-3 flex-1 font-bold text-lg text-center shadow-sm">
                        <!-- Options generated in JS -->
                    </select>
                    <div class="relative">
                        <input type="file" id="camera-input" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="handleImageUpload(event)" />
                        <button type="button" id="ocr-btn" class="px-4 py-3 rounded-lg shadow-sm font-bold bg-white text-blue-600 border border-blue-200 flex items-center">
                            <i data-lucide="camera" class="w-4 h-4 mr-1"></i> OCR
                        </button>
                    </div>
                </div>
            </div>

            <div class="mb-8 grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">日付</label>
                    <input type="date" id="input-date" class="border-gray-300 rounded-lg p-2 w-full" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">時刻</label>
                    <input type="time" id="input-time" class="border-gray-300 rounded-lg p-2 w-full" />
                </div>
            </div>

            <div class="flex justify-between items-center border-t pt-4">
                <button id="btn-delete" onclick="deleteEvent()" class="text-red-600 font-bold hidden flex items-center">
                    <i data-lucide="trash-2" class="w-4 h-4 mr-1"></i>削除
                </button>
                <div class="flex space-x-3 ml-auto">
                    <button onclick="closeModal()" class="px-5 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg">キャンセル</button>
                    <button onclick="saveEvent()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold shadow-md hover:bg-blue-700 flex items-center">
                        <i data-lucide="save" class="w-4 h-4 mr-1 hidden" id="save-spinner"></i> 保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // ==========================================
        //  設定 (GAS URL)
        // ==========================================
        // ★ここにGASでデプロイしたWebアプリのURLを貼り付けます★
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzlVZQfhy4Xfy2onkOKRJduHUMqzFt1osxg-zEUs7PEdrozvcv1o3jeLpzzB6_OkKov/exec"; 

        // ==========================================
        //  状態管理
        // ==========================================
        let currentView = 'month';
        let currentDate = new Date();
        let events = [];
        
        let editingEventId = null;
        let selectedType = '入庫';

        // 初期化処理
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // 駐車番号セレクトボックス生成
            const select = document.getElementById('parkNo');
            for(let i=1; i<=20; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i;
                select.appendChild(opt);
            }

            changeView('month');
            fetchEvents(); // データ取得
        });

        // ==========================================
        //  通信 (GAS・API連携)
        // ==========================================
        
        // データ取得
        async function fetchEvents() {
            if(!GAS_WEBAPP_URL) {
                console.log("GAS_WEBAPP_URLが未設定のため、ローカルモードで動作します。");
                return;
            }
            updateStatus('同期中...');
            try {
                const res = await fetch(GAS_WEBAPP_URL);
                const data = await res.json();
                if(Array.isArray(data)) {
                    events = data;
                    render();
                    updateStatus('同期完了');
                }
            } catch (e) {
                console.error(e);
                updateStatus('通信エラー');
            }
        }

        // GASへPOST送信
        async function sendToGas(action, payload) {
            if(!GAS_WEBAPP_URL) return true; // ローカル用
            
            updateStatus('保存中...');
            try {
                // text/plainとして送信しCORSを回避
                const res = await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action, payload })
                });
                const result = await res.json();
                updateStatus(result.success ? '同期完了' : 'エラー');
                return result.success;
            } catch (e) {
                console.error(e);
                updateStatus('通信エラー');
                return false;
            }
        }

        function updateStatus(text) {
            document.getElementById('sync-status').textContent = text;
        }

        // ==========================================
        //  Gemini API (AI-OCR)
        // ==========================================
        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const btn = document.getElementById('ocr-btn');
            btn.innerHTML = `<span class="animate-spin w-4 h-4 mr-1 border-2 border-blue-600 border-t-transparent rounded-full"></span> 解析中...`;
            btn.disabled = true;

            const reader = new FileReader();
            reader.onloadend = async () => {
                const apiKey = ""; // Canvas環境提供キー
                const base64ImageData = reader.result;
                const base64Data = base64ImageData.split(',')[1];
                const mimeType = base64ImageData.split(';')[0].split(':')[1];
                
                const prompt = "あなたは自転車駐車場の管理AIです。画像内にある「赤色で書かれた数字（1から20までのいずれか）」を探し出し、その数字のみを出力してください。見つからない場合は「none」と出力してください。";
                const payload = { contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType, data: base64Data } }] }] };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                    let recognized = false;
                    
                    if (text && text.toLowerCase() !== 'none') {
                        const match = text.match(/\d+/);
                        if (match) {
                            const num = parseInt(match[0], 10);
                            if (num >= 1 && num <= 20) {
                                document.getElementById('parkNo').value = num.toString();
                                alert(`AI解析完了: 駐車番号 ${num}`);
                                recognized = true;
                            }
                        }
                    }
                    if(!recognized) alert('赤文字の数字を読み取れませんでした。');
                } catch(err) {
                    alert('OCR解析中にエラーが発生しました。');
                } finally {
                    btn.innerHTML = `<i data-lucide="camera" class="w-4 h-4 mr-1"></i> OCR`;
                    btn.disabled = false;
                    lucide.createIcons();
                }
            };
            reader.readAsDataURL(file);
        }

        // ==========================================
        //  UI 制御
        // ==========================================

        function changeView(v) {
            currentView = v;
            // ボタンスタイル更新
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                btn.classList.add('text-gray-600');
            });
            const activeBtn = document.getElementById(`btn-${v}`);
            activeBtn.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
            activeBtn.classList.remove('text-gray-600');
            render();
        }

        function prevPeriod() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
            if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
            if (currentView === 'day') currentDate.setDate(currentDate.getDate() - 1);
            render();
        }

        function nextPeriod() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
            if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
            if (currentView === 'day') currentDate.setDate(currentDate.getDate() + 1);
            render();
        }

        function goToday() {
            currentDate = new Date();
            render();
        }

        // ==========================================
        //  モーダル制御 & データ保存・削除
        // ==========================================
        function selectType(type) {
            selectedType = type;
            
            // スタイルリセット
            document.querySelectorAll('.type-lbl').forEach(el => {
                el.classList.remove('ring-2', 'ring-offset-1', 'bg-green-100', 'bg-orange-100', 'bg-gray-100', 'border-green-300', 'border-orange-300', 'border-gray-300', 'border-opacity-100');
            });

            const lbl = type === '入庫' ? 'lbl-type-in' : type === '出庫' ? 'lbl-type-out' : 'lbl-type-walk';
            const colorClass = type === '入庫' ? ['bg-green-100', 'border-green-300'] : type === '出庫' ? ['bg-orange-100', 'border-orange-300'] : ['bg-gray-100', 'border-gray-300'];
            
            const target = document.getElementById(lbl);
            target.classList.add(...colorClass, 'ring-2', 'ring-offset-1', 'border-opacity-100');

            document.getElementById('park-no-container').style.display = type === '徒歩' ? 'none' : 'block';
        }

        function openModal(id = null) {
            editingEventId = id;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('btn-delete').classList.toggle('hidden', !id);
            document.getElementById('modal-title').textContent = id ? '記録の編集' : '新規記録';

            let ev = id ? events.find(e => e.id === id) : null;
            
            selectType(ev ? ev.type : '入庫');
            document.getElementById('parkNo').value = ev && ev.parkNo ? ev.parkNo : '1';

            const d = ev ? new Date(ev.timestamp) : new Date();
            // JST等ローカルタイムゾーン考慮
            const localDate = new Date(d.getTime() - (d.getTimezoneOffset() * 60000));
            document.getElementById('input-date').value = localDate.toISOString().split('T')[0];
            document.getElementById('input-time').value = localDate.toISOString().substring(11, 16);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            editingEventId = null;
        }

        async function saveEvent() {
            const dateStr = document.getElementById('input-date').value;
            const timeStr = document.getElementById('input-time').value;
            const timestamp = new Date(`${dateStr}T${timeStr}:00`).toISOString();
            
            const payload = {
                id: editingEventId || Date.now().toString(),
                type: selectedType,
                parkNo: selectedType === '徒歩' ? null : document.getElementById('parkNo').value,
                timestamp: timestamp
            };

            // 先にローカルの配列を更新して再描画（オプティミスティックUI）
            if (editingEventId) {
                events = events.map(e => e.id === payload.id ? payload : e);
            } else {
                events.push(payload);
            }
            closeModal();
            render();

            // バックグラウンドでGASへ送信
            const action = editingEventId ? 'update' : 'create';
            await sendToGas(action, payload);
        }

        async function deleteEvent() {
            if(!confirm("本当に削除しますか？")) return;
            
            const id = editingEventId;
            // ローカルから削除
            events = events.filter(e => e.id !== id);
            closeModal();
            render();

            // バックグラウンドでGASへ送信
            await sendToGas('delete', { id: id });
        }

        // ==========================================
        //  描画ロジック
        // ==========================================
        function render() {
            updateHeaderDate();
            const container = document.getElementById('calendar-container');
            
            if (currentView === 'month') container.innerHTML = generateMonthHTML();
            else if (currentView === 'week') container.innerHTML = generateWeekHTML();
            else container.innerHTML = generateDayHTML();
            
            lucide.createIcons(); // 新規生成されたDOMのアイコンを適用
        }

        function updateHeaderDate() {
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth() + 1;
            let text = '';
            
            if (currentView === 'month') text = `${y}年 ${m}月`;
            else if (currentView === 'day') text = `${y}年 ${m}月 ${currentDate.getDate()}日`;
            else {
                const start = new Date(currentDate);
                start.setDate(currentDate.getDate() - currentDate.getDay());
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                if (start.getMonth() === end.getMonth()) {
                    text = `${y}年 ${m}月 ${start.getDate()}日 - ${end.getDate()}日`;
                } else {
                    text = `${start.getFullYear()}年${start.getMonth()+1}月${start.getDate()}日 - ${end.getFullYear()}年${end.getMonth()+1}月${end.getDate()}日`;
                }
            }
            document.getElementById('header-date').textContent = text;
        }

        function generateEventHTML(ev) {
            const time = new Date(ev.timestamp).toTimeString().substring(0,5);
            let style = '';
            if (ev.type === '入庫') style = 'bg-green-50 border-green-200 text-green-800';
            else if (ev.type === '徒歩') style = 'bg-gray-50 border-gray-200 text-gray-700';
            else style = 'bg-orange-50 border-orange-200 text-orange-800';

            return `
                <div onclick="openModal('${ev.id}')" class="cursor-pointer text-xs p-1 rounded truncate border font-medium ${style} mb-1">
                    ${time} ${ev.type} ${ev.parkNo ? `#${ev.parkNo}` : ''}
                </div>
            `;
        }

        function generateMonthHTML() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const numDays = new Date(year, month + 1, 0).getDate();
            const prevMonthNumDays = new Date(year, month, 0).getDate();
            
            let html = '<div class="grid grid-cols-7 gap-px bg-gray-200 border border-gray-200 shadow-sm rounded-xl overflow-hidden h-full">';
            
            const weekNames = ['日', '月', '火', '水', '木', '金', '土'];
            weekNames.forEach((d, i) => {
                const color = i===0 ? 'text-red-600' : i===6 ? 'text-blue-600' : 'text-gray-700';
                html += `<div class="bg-gray-50 text-center text-sm font-bold py-2 ${color}">${d}</div>`;
            });

            // Prev month days
            for(let i=0; i<firstDay; i++) {
                html += `<div class="bg-gray-100 min-h-[100px] p-2 text-gray-400 opacity-60"><div class="text-sm font-semibold">${prevMonthNumDays - firstDay + i + 1}</div></div>`;
            }

            // Current month days
            for(let d=1; d<=numDays; d++) {
                const currentD = new Date(year, month, d);
                const isToday = new Date().toDateString() === currentD.toDateString();
                const dayEvents = events.filter(e => new Date(e.timestamp).toDateString() === currentD.toDateString()).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                
                const bgClass = isToday ? 'bg-blue-50/50' : 'bg-white';
                const circleClass = isToday ? 'bg-blue-600 text-white' : 'text-gray-700';

                let eventsHtml = dayEvents.map(generateEventHTML).join('');

                html += `
                    <div class="${bgClass} min-h-[100px] p-1 md:p-2 flex flex-col">
                        <div class="text-sm font-bold mb-1 w-6 h-6 flex items-center justify-center rounded-full ${circleClass}">${d}</div>
                        <div class="flex-1 overflow-y-auto hide-scrollbar space-y-1">${eventsHtml}</div>
                    </div>
                `;
            }

            // Next month days
            const totalCells = Math.ceil((firstDay + numDays) / 7) * 7;
            for(let i=1; i<=(totalCells - (firstDay + numDays)); i++) {
                html += `<div class="bg-gray-100 min-h-[100px] p-2 text-gray-400 opacity-60"><div class="text-sm font-semibold">${i}</div></div>`;
            }

            html += '</div>';
            return html;
        }

        function generateWeekHTML() {
            const startOfWeek = new Date(currentDate);
            startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
            
            let html = '<div class="flex flex-col md:grid md:grid-cols-7 gap-px bg-gray-200 border border-gray-200 rounded-xl overflow-hidden h-full">';
            
            for(let i=0; i<7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(startOfWeek.getDate() + i);
                const isToday = new Date().toDateString() === d.toDateString();
                const dayEvents = events.filter(e => new Date(e.timestamp).toDateString() === d.toDateString()).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                
                const headerColor = isToday ? 'border-blue-500 text-blue-600' : 'border-gray-100 text-gray-700';
                const dayNameColor = i===0 ? 'text-red-500' : i===6 ? 'text-blue-500' : 'text-gray-500';
                const dayNames = ['日', '月', '火', '水', '木', '金', '土'];

                let eventsHtml = dayEvents.map(ev => {
                    const time = new Date(ev.timestamp).toTimeString().substring(0,5);
                    let style = ev.type === '入庫' ? 'bg-green-50 border-green-200 text-green-900' : ev.type === '徒歩' ? 'bg-gray-50 border-gray-200 text-gray-800' : 'bg-orange-50 border-orange-200 text-orange-900';
                    return `
                        <div onclick="openModal('${ev.id}')" class="cursor-pointer text-xs p-2 rounded border ${style}">
                            <div class="font-bold">${time}</div>
                            <div>${ev.type} ${ev.parkNo ? `No.${ev.parkNo}` : ''}</div>
                        </div>
                    `;
                }).join('');

                html += `
                    <div class="bg-white p-2 min-h-[150px] md:min-h-full flex flex-col">
                        <div class="text-sm font-bold border-b-2 pb-1 mb-2 flex justify-between items-center ${headerColor}">
                            <span>${d.getMonth() + 1}/${d.getDate()}</span>
                            <span class="${dayNameColor}">${dayNames[i]}</span>
                        </div>
                        <div class="flex-1 overflow-y-auto hide-scrollbar space-y-1">${eventsHtml}</div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        function generateDayHTML() {
            const dayEvents = events.filter(e => new Date(e.timestamp).toDateString() === currentDate.toDateString()).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            let html = '<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 h-full overflow-y-auto max-w-3xl mx-auto w-full">';
            
            if (dayEvents.length === 0) {
                html += `<div class="flex flex-col items-center justify-center py-10 text-gray-400"><p class="font-bold">この日の記録はありません</p></div>`;
            } else {
                html += '<div class="space-y-3">';
                html += dayEvents.map(ev => {
                    const time = new Date(ev.timestamp).toTimeString().substring(0,5);
                    const tagColor = ev.type === '入庫' ? 'bg-green-500' : ev.type === '徒歩' ? 'bg-gray-500' : 'bg-orange-500';
                    return `
                        <div onclick="openModal('${ev.id}')" class="cursor-pointer flex items-center p-4 rounded-xl border bg-gray-50 hover:bg-white hover:border-blue-200 transition-all">
                            <div class="w-20 text-lg font-black text-gray-700">${time}</div>
                            <div class="flex-1 flex items-center">
                                <span class="px-2 py-1 rounded text-sm font-bold text-white ${tagColor}">${ev.type}</span>
                                ${ev.parkNo ? `<span class="ml-3 text-lg font-bold text-gray-800">No.${ev.parkNo}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                html += '</div>';
            }
            html += '</div>';
            return html;
        }
    </script>
</body>
</html>
